<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Radio Mapper v3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #map { flex: 1; width: 100%; background: #ddd; }
        #controls { height: 35%; padding: 15px; background: #f4f4f4; border-top: 2px solid #ccc; overflow-y: auto; box-sizing: border-box; }
        .btn { padding: 10px; margin: 5px 2px; border: none; border-radius: 4px; color: white; font-weight: bold; font-size: 14px; }
        .blue { background: #007bff; } .green { background: #28a745; }
        .info { font-size: 12px; color: #555; margin-top: 5px; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="controls">
    <button class="btn blue" onclick="findMe()">0. GPS Center</button>
    <button class="btn blue" onclick="startBLEScan()">1. Enable BLE</button>
    <button class="btn green" onclick="downloadData()">2. Export JSON</button>
    <input type="text" id="poiName" placeholder="Ward name / POI (optional)" style="padding: 10px; width: 80%;">
    
    <div style="margin: 10px 0;">
        <strong>Floor:</strong> 
        <select id="floorSelect">
            <option value="1">Level 1</option>
            <option value="2">Level 2</option>
        </select>
    </div>

    <div id="status" class="info">Status: Ready</div>
    <div id="count" class="info">Devices: 0</div>
    <div id="log" class="info" style="border-top: 1px solid #ccc; padding-top: 5px;">Logs: Tap map to record.</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- 1. SETUP ---
    const map = L.map('map').setView([51.505, -0.09], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 20 }).addTo(map);

    let surveyData = [];
    let currentPos = null;
    let lastSeenDevices = new Map();
    let tempMarker = L.circleMarker([0,0], {color: 'red', radius: 10}).addTo(map);

    // --- 2. GPS ---
    function findMe() {
        document.getElementById('status').innerText = "Locating...";
        map.locate({ setView: true, maxZoom: 18 });
    }

    map.on('locationfound', (e) => {
        currentPos = e.latlng;
        tempMarker.setLatLng(e.latlng);
        document.getElementById('status').innerText = "GPS Fixed.";
    });

    // --- 3. MAP CLICK ---
    map.on('click', (e) => {
        currentPos = e.latlng;
        tempMarker.setLatLng(e.latlng);
        recordMeasurement();
    });

    // --- 4. BLUETOOTH ---
    async function startBLEScan() {
        try {
            const scan = await navigator.bluetooth.requestLEScan({
                keepRepeatedDevices: true,
                acceptAllAdvertisements: true
            });
            document.getElementById('status').innerText = "Scan Active!";
            
    navigator.bluetooth.addEventListener('advertisementreceived', event => {
        // 1. Try to find the most 'unique' identifier available
        // address is the MAC, id is a browser-generated UUID
        const devId = event.device.address || event.device.id;
        const devName = event.device.name || "Unknown";
    
        // 2. Only log it if we actually found an ID 
        if (devId) {
            lastSeenDevices.set(devId, {
                id: devId,
                name: devName,
                rssi: event.rssi,
                ts: Date.now(),
                // Adding txPower can help with distance math later
                txPower: event.txPower || "N/A" 
            });
    }

    document.getElementById('count').innerText = "Unique IDs: " + lastSeenDevices.size;
});
        } catch (err) {
            alert("BLE Error: " + err);
        }
    }

    // --- 5. DATA ---
    function recordMeasurement() {
        if (!currentPos) return;
        const poi = document.getElementById('poiName').value;
        const signals = Array.from(lastSeenDevices.values());
        const entry = {
            lat: currentPos.lat,
            lng: currentPos.lng,
            floor: document.getElementById('floorSelect').value,
            poi: poi || "Point", // If empty
            signals: signals
        };
        surveyData.push(entry);
        const color = poi ? 'red' : 'blue';
        L.circle(currentPos, {radius: 2, color: color}).addTo(map);
        document.getElementById('log').innerText = "Saved point with " + signals.size + " signals.";
        // Clear the input for the next point
        document.getElementById('poiName').value = "";
        document.getElementById('status').innerText = `Saved: ${poi || "Coordinate"}`;
    }

    function downloadData() {
        const blob = new Blob([JSON.stringify(surveyData, null, 2)], {type : 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `survey_${Date.now()}.json`;
        a.click();
    }
</script>
</body>
</html>
